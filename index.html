<style>
body {
  background: #121213;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* CONTROLES */
select, input, button {
  padding: 8px;
  margin: 5px;
}

/* TABULEIRO */
#tabuleiro {
  display: grid;
  gap: 8px;
  justify-content: center;
  margin: 20px auto;
}

.linha {
  display: grid;
  gap: 5px;
  justify-content: center;
}

.letra {
  width: 50px;
  height: 50px;
  border: 2px solid #3a3a3c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 20px;
}

/* CORES */
.correta { background: #538d4e; }
.lugarErrado { background: #b59f3b; }
.errada { background: #3a3a3c; }

/* TECLADO */
#teclado {
  margin-top: 10px;
}
#teclado button {
  margin: 2px;
  padding: 10px;
  font-size: 14px;
}

/* TIMER */
#timer {
  font-size: 20px;
  margin-top: 10px;
}
</style>

let palavraSecreta, dicaAtual;
let tentativa = 0;
let pontos = 0;
let streak = 0;
let tamanhoPalavra = 0;
let tempo = 0;
let intervalo;
let jogoAtivo = true;
let usadas = [];

const maxTentativas = 6;

const tabuleiro = document.getElementById("tabuleiro");
const entrada = document.getElementById("entrada");

function tocar(id) {
  const som = document.getElementById(id);
  som.currentTime = 0;
  som.play();
}

function iniciarTimer(segundos) {
  clearInterval(intervalo);
  tempo = segundos;

  intervalo = setInterval(() => {
    let m = Math.floor(tempo / 60);
    let s = tempo % 60;

    document.getElementById("timer").textContent =
      `⏱️ ${m}:${s.toString().padStart(2, '0')}`;

    tempo--;

    if (tempo < 0) {
      jogoAtivo = false;
      clearInterval(intervalo);
      document.getElementById("mensagem").textContent = "⏰ Tempo esgotado!";
    }
  }, 1000);
}

function iniciarJogo() {
  pontos = parseInt(localStorage.getItem("pontos")) || 0;
  document.getElementById("pontos").textContent = pontos;

  jogoAtivo = true;
  tentativa = 0;

  const dificuldade = parseInt(document.getElementById("dificuldade").value);
  iniciarTimer(dificuldade);

  novaRodada();
  criarTeclado();
  mostrarRanking();
}

function novaRodada() {
  const temaSelecionado = document.getElementById("tema").value;
  const lista = temas[temaSelecionado];

  if (usadas.length === lista.length) usadas = [];

  let sorteado;
  do {
    sorteado = lista[Math.floor(Math.random() * lista.length)];
  } while (usadas.includes(sorteado.palavra));

  usadas.push(sorteado.palavra);

  palavraSecreta = sorteado.palavra;
  dicaAtual = sorteado.dica;
  tamanhoPalavra = palavraSecreta.length;
  tentativa = 0;

  entrada.maxLength = tamanhoPalavra;
  entrada.value = "";
  entrada.focus();

  document.getElementById("dica").textContent = "💡 " + dicaAtual;
  document.getElementById("mensagem").textContent = "";

  criarTabuleiro();
}

function criarTabuleiro() {
  tabuleiro.innerHTML = "";

  for (let i = 0; i < maxTentativas; i++) {
    let linha = document.createElement("div");
    linha.classList.add("linha");
    linha.style.gridTemplateColumns = `repeat(${tamanhoPalavra}, 50px)`;

    for (let j = 0; j < tamanhoPalavra; j++) {
      let letra = document.createElement("div");
      letra.classList.add("letra");
      linha.appendChild(letra);
    }

    tabuleiro.appendChild(linha);
  }
}

function enviar() {
  if (!jogoAtivo) return;

  let palpite = entrada.value.toUpperCase();

  if (palpite.length !== tamanhoPalavra) return;

  let linha = tabuleiro.children[tentativa].children;

  let segredo = palavraSecreta.split("");
  let palpiteArr = palpite.split("");

  for (let i = 0; i < tamanhoPalavra; i++) {
    linha[i].textContent = palpite[i];

    if (palpiteArr[i] === segredo[i]) {
      linha[i].classList.add("correta");
      segredo[i] = null;
      palpiteArr[i] = null;
    }
  }

  for (let i = 0; i < tamanhoPalavra; i++) {
    if (palpiteArr[i]) {
      if (segredo.includes(palpiteArr[i])) {
        linha[i].classList.add("lugarErrado");
        segredo[segredo.indexOf(palpiteArr[i])] = null;
      } else {
        linha[i].classList.add("errada");
      }
    }
  }

  if (palpite === palavraSecreta) {
    tocar("somAcerto");

    streak++;
    pontos += 10 * streak;

    localStorage.setItem("pontos", pontos);
    document.getElementById("pontos").textContent = pontos;

    jogoAtivo = false;

    setTimeout(() => {
      jogoAtivo = true;
      novaRodada();
    }, 800);

    return;
  }

  tentativa++;

  if (tentativa === maxTentativas) {
    tocar("somErro");
    streak = 0;
    jogoAtivo = false;
    document.getElementById("mensagem").textContent =
      "❌ Você perdeu! Palavra: " + palavraSecreta;
  }

  entrada.value = "";
  entrada.focus();
}

function criarTeclado() {
  const teclado = document.getElementById("teclado");
  teclado.innerHTML = "";

  const letras = "QWERTYUIOPASDFGHJKLZXCVBNM";

  letras.split("").forEach(letra => {
    let btn = document.createElement("button");
    btn.textContent = letra;

    btn.onclick = () => {
      entrada.value += letra;
      entrada.focus();
    };

    teclado.appendChild(btn);
  });
}

function salvarRanking() {
  const nome = document.getElementById("nome").value;

  if (!nome || nome.length < 2) {
    alert("Digite um nome válido!");
    return;
  }

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.push({
    nome: nome,
    pontos: pontos,
    data: new Date().toLocaleDateString()
  });

  ranking.sort((a, b) => b.pontos - a.pontos);
  ranking = ranking.slice(0, 5);

  localStorage.setItem("ranking", JSON.stringify(ranking));
  mostrarRanking();
}

function mostrarRanking() {
  const rankingLista = document.getElementById("ranking");
  rankingLista.innerHTML = "";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.forEach(jogador => {
    let li = document.createElement("li");
    li.textContent = `${jogador.nome} - ${jogador.pontos} pts (${jogador.data})`;
    rankingLista.appendChild(li);
  });
}

entrada.addEventListener("keypress", e => {
  if (e.key === "Enter") enviar();
});
